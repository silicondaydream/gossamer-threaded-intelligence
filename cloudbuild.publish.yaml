substitutions:
  _REGION: us-central1
  _PY_REPO: python-packages

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: python:3.10-slim
    id: Build wheel
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        pip install --no-cache-dir --upgrade pip build
        python -m build --wheel --outdir dist
        ls -lah dist

  - name: python:3.10-slim
    id: Smoke test wheel (local)
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        pip install --no-cache-dir dist/*.whl
        python - <<'PY'
        # Verify that the new Phase 2+ subpackages actually ship in the wheel.
        # If any of these fails, find_packages() missed a subpackage (e.g.,
        # a dir was added without __init__.py).
        for mod in (
            'gossamer.algorithms.coordination.flocking',
            'gossamer.algorithms.coordination.flocking_gnn',
            'gossamer.algorithms.coordination.consensus_gnn',
            'gossamer.algorithms.coordination.dmb',
            'gossamer.algorithms.coordination.tfaco',
            'gossamer.algorithms.coordination.iccd',
            'gossamer.algorithms.coordination.hma',
            'gossamer.algorithms.coordination.milp_baseline',
            'gossamer.algorithms.coordination.primitive',
            'gossamer.crdt',
            'gossamer.graph',
            'gossamer.metrics.info',
            'gossamer.metrics.criticality',
            'gossamer.metrics.graph',
            'gossamer.benchmarks',
            'gossamer.utils.spatial',
            'gossamer.tasks',
            'gossamer.tasks.tasks',
            'gossamer.prediction',
            'gossamer.prediction.baselines',
            'gossamer.engine',
            'gossamer.algorithms.coordination.kernels',
        ):
            __import__(mod)
        # Symbol-level checks: importing a module cannot catch a function that
        # never shipped. Each of these is consumed by Maneuver.Map, so a wheel
        # missing one breaks the runner rather than this build.
        from gossamer.metrics.info import collective_transfer_entropy  # noqa: F401
        # policies.py imports these instead of reimplementing them (M6.6).
        from gossamer.algorithms.coordination.kernels import (  # noqa: F401
            boids_accel_edges, kdtree_edges,
        )
        # The benchmark harness steps through this, not a private copy (M6.7).
        from gossamer.engine import PhysicsEngine, ReferenceEngine  # noqa: F401
        # The only task whose Q actually responds to tau_sec (P4b).
        from gossamer.tasks import ALL_TASKS, TrackingRendezvousTask  # noqa: F401
        assert "tracking_rendezvous" in ALL_TASKS

        # The benchmark is the N2 moat and ships as a public package, but the gate
        # only ever checked that `gossamer.benchmarks` IMPORTS — so a wheel could
        # ship with the whole public API missing and pass.
        from gossamer.benchmarks import (  # noqa: F401
            ALL_SCENARIOS, DEFAULT_BASELINES, BenchmarkConfig,
            generate_leaderboard_md, leaderboard, run_benchmark,
        )
        assert set(ALL_SCENARIOS) == {
            "dispersal", "rendezvous", "coverage", "leader_follower", "byzantine"
        }, ALL_SCENARIOS
        assert set(DEFAULT_BASELINES) == {
            "random", "gossamer_flocking", "greedy"
        }, DEFAULT_BASELINES

        # ByzantineScenario was a NO-OP: it marked its adversaries and the harness
        # never read the marks, so the "byzantine" leaderboard row was a plain
        # rendezvous run. The corruption hook is what makes it adversarial at all,
        # and it is reached through the Scenario base class — exactly the kind of
        # surface that fails silently on a stale wheel and reads as a result.
        import numpy as np
        from gossamer.benchmarks.scenarios import ByzantineScenario
        _sc = ByzantineScenario(byzantine_fraction=1.0, adversary="inverted")
        _sc.init_state(np.random.default_rng(0), num_agents=4, bound=10.0)
        assert np.allclose(
            _sc.corrupt_actions(np.ones((4, 3)), np.random.default_rng(0), None), -1.0
        ), "ByzantineScenario is not corrupting actions — the benchmark row is a lie"

        # The adapter that lets the benchmark run on the real substrate. Its absence
        # is why every benchmark number to date came from ReferenceEngine.
        from gossamer.leviathan_engine import LeviathanEngine  # noqa: F401
        from gossamer.benchmarks.cli import main as _bench_main  # noqa: F401
        print("✅ Import OK")
        PY

  - name: python:3.10-slim
    id: Upload to Artifact Registry Python repo
    entrypoint: bash
    env:
      - TWINE_REPOSITORY_URL=https://$_REGION-python.pkg.dev/$PROJECT_ID/$_PY_REPO/
    args:
      - -c
      - |
        set -euo pipefail
        pip install --no-cache-dir twine keyrings.google-artifactregistry-auth
        # Note: Artifact Registry's PyPI endpoint does NOT support
        # --skip-existing. Re-uploading an existing version returns 400; bump
        # the version in setup.py instead of relying on idempotent upload.
        python -m twine upload --non-interactive dist/*

images: []
